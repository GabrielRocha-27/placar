<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Placar</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  background: transparent;
}

#overlay {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px 25px;
  border-radius:12px;
  text-align:center;
}

#score {
  font-size:32px;
  margin:0;
}

#time {
  font-size:20px;
  margin:0;
}

#controls {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

button {
  margin:5px;
  padding:10px;
  font-size:14px;
  cursor:pointer;
}

input {
  margin:5px;
  padding:8px;
  width:90px;
}

.hide {
  display:none;
}
</style>
</head>

<body>

<div id="overlay">
  <h1 id="score">TIME A 0 x 0 TIME B</h1>
  <h2 id="time">Q1 - 10:00</h2>
</div>

<div id="controls">

  <h3>Times</h3>
  <div>
    <input type="text" id="teamAName" placeholder="Time A">
    <input type="text" id="teamBName" placeholder="Time B">
    <button onclick="setTeams()">Definir</button>
  </div>

  <h3>Pontos</h3>

  <div>
    <button onclick="add('A',1)">+1 A</button>
    <button onclick="add('A',2)">+2 A</button>
    <button onclick="add('A',3)">+3 A</button>
    <button onclick="add('A',-1)">-1 A</button>
  </div>

  <div>
    <button onclick="add('B',1)">+1 B</button>
    <button onclick="add('B',2)">+2 B</button>
    <button onclick="add('B',3)">+3 B</button>
    <button onclick="add('B',-1)">-1 B</button>
  </div>

  <h4>Definir Placar</h4>
  <div>
    <input type="number" id="setScoreA" placeholder="Pts A">
    <input type="number" id="setScoreB" placeholder="Pts B">
    <button onclick="setScore()">Definir</button>
  </div>

  <h3>Tempo</h3>
  <div>
    <input type="number" id="setMin" placeholder="Min">
    <input type="number" id="setSec" placeholder="Seg">
    <button onclick="setTime()">Definir</button>
  </div>

  <div>
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="reset()">Reset</button>
  </div>

  <div>
    <button onclick="nextQ()">Próximo Período</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdJW9Jhakm_4i4IkJJOtM4qcM8xSf2Yew",
  authDomain: "placar-live-fd339.firebaseapp.com",
  databaseURL: "https://placar-live-fd339-default-rtdb.firebaseio.com",
  projectId: "placar-live-fd339",
  storageBucket: "placar-live-fd339.firebasestorage.app",
  messagingSenderId: "857922312063",
  appId: "1:857922312063:web:297e23addf881afa482c4a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const placarRef = ref(db, "placar");

/* VARIÁVEIS */
let scoreA = 0, scoreB = 0;
let min = 10, sec = 0;
let timer;

let teamA = "TIME A";
let teamB = "TIME B";

/* PERÍODOS */
let periodIndex = 0;
const periods = ["Q1", "Q2", "Q3", "Q4", "OT1", "OT2"];

/* RECEBE DADOS */
onValue(placarRef, (snapshot) => {
  const data = snapshot.val();
  if(data){
    scoreA = data.scoreA ?? 0;
    scoreB = data.scoreB ?? 0;
    min = data.min ?? 10;
    sec = data.sec ?? 0;
    teamA = data.teamA ?? "TIME A";
    teamB = data.teamB ?? "TIME B";
    periodIndex = data.periodIndex ?? 0;
    update();
  }
});

/* SALVAR */
function save(){
  set(placarRef, { scoreA, scoreB, min, sec, teamA, teamB, periodIndex });
}

/* ATUALIZAR */
function update(){
  document.getElementById("score").innerText =
    `${teamA} ${scoreA} x ${scoreB} ${teamB}`;

  document.getElementById("time").innerText =
    `${periods[periodIndex]} - ${min}:${sec.toString().padStart(2,'0')}`;
}

/* FUNÇÕES */
window.add = function(team,p){
  if(team==='A'){
    scoreA += p;
    if(scoreA < 0) scoreA = 0;
  } else {
    scoreB += p;
    if(scoreB < 0) scoreB = 0;
  }
  save();
};

window.setScore = function(){
  let a = parseInt(document.getElementById("setScoreA").value);
  let b = parseInt(document.getElementById("setScoreB").value);

  if(!isNaN(a)) scoreA = a;
  if(!isNaN(b)) scoreB = b;

  save();
};

window.setTeams = function(){
  let a = document.getElementById("teamAName").value;
  let b = document.getElementById("teamBName").value;

  if(a) teamA = a;
  if(b) teamB = b;

  save();
};

window.setTime = function(){
  let m = parseInt(document.getElementById("setMin").value);
  let s = parseInt(document.getElementById("setSec").value);

  if(!isNaN(m)) min = m;
  if(!isNaN(s)) sec = s;

  save();
};

window.start = function(){
  clearInterval(timer);
  timer = setInterval(()=>{
    if(sec === 0){
      if(min === 0){
        clearInterval(timer);
        return;
      }
      min--;
      sec = 59;
    } else {
      sec--;
    }
    save();
  },1000);
};

window.pause = function(){
  clearInterval(timer);
};

window.reset = function(){
  clearInterval(timer);
  min = 10;
  sec = 0;
  save();
};

window.nextQ = function(){
  periodIndex = (periodIndex + 1) % periods.length;
  reset();
};

/* OVERLAY */
const params = new URLSearchParams(window.location.search);
if(params.get("overlay") === "true"){
  document.getElementById("controls").classList.add("hide");
}

update();

</script>

</body>
</html>
